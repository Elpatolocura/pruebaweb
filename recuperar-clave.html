<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Clave - Eventia</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- CSS -->
    <link rel="stylesheet" href="./css/styles.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.15), transparent),
                        radial-gradient(circle at bottom left, rgba(236, 72, 153, 0.1), transparent);
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            animation: fadeIn 0.8s ease-out;
        }

        .auth-card {
            padding: 40px;
            text-align: center;
        }

        .auth-header { margin-bottom: 32px; }
        .auth-header i { font-size: 3rem; color: var(--primary-color); margin-bottom: 24px; }
        .auth-header h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
        .auth-header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .auth-form { text-align: left; }
        .auth-form .input-group { margin-bottom: 24px; }
        .auth-form label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.85rem; }
        
        .auth-input-wrapper {
            position: relative;
            display: flex; align-items: center;
        }
        .auth-input-wrapper i {
            position: absolute; left: 16px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .auth-input-wrapper .auth-input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            border-radius: 12px;
            background: rgba(var(--primary-rgb), 0.03);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            transition: all 0.2s;
            outline: none;
        }

        .success-state {
            display: none;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="light-mode">

    <div class="auth-container">
        <div class="auth-card glass-panel" id="main-card">
            
            <div id="request-form">
                <div class="auth-header">
                    <i class="ph ph-key-hole"></i>
                    <h2>¿Olvidaste tu contraseña?</h2>
                    <p>No te preocupes. Introduce el correo asociado a tu cuenta y te enviaremos instrucciones.</p>
                </div>

                <form class="auth-form" id="recovery-form">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <div class="auth-input-wrapper">
                            <i class="ph ph-envelope"></i>
                            <input type="email" class="auth-input" placeholder="tu@email.com" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-full" style="padding: 14px; font-weight: 700;">Enviar Instrucciones</button>
                    
                    <div style="margin-top: 24px;">
                        <a href="login.html" class="btn-text" style="text-decoration: none; color: var(--text-muted); font-weight: 600; font-size: 0.9rem;">
                            <i class="ph ph-arrow-left"></i> Volver a Iniciar Sesión
                        </a>
                    </div>
                </form>
            </div>

            <div id="success-state" class="success-state">
                <div class="auth-header">
                    <i class="ph ph-paper-plane-tilt" style="color: var(--success-color);"></i>
                    <h2>¡Correo enviado!</h2>
                    <p>Revisa tu bandeja de entrada. Te hemos enviado un enlace para restablecer tu contraseña.</p>
                </div>
                <a href="login.html" class="btn btn-primary w-full" style="padding: 14px; font-weight: 700; text-decoration: none; display: block;">Ir al Inicio</a>
            </div>

        </div>
    </div>

    <script>
        const savedTheme = localStorage.getItem('eventia-theme');
        if (savedTheme === 'dark' || (savedTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.body.classList.add('dark-theme');
        }

        document.getElementById('recovery-form').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('request-form').style.display = 'none';
            document.getElementById('success-state').style.display = 'block';
        });
    </script>
</body>
</html>
