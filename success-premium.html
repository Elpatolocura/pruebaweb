<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Felicidades! - Eventia Premium</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --brand-primary: #FF5A2D;
            --brand-bg: #140705;
            --primary-rgb: 255, 90, 45;
        }

        body {
            background-color: var(--brand-bg);
            color: #ffffff;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 60px;
            border-radius: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-icon {
            width: 100px; height: 100px;
            background: var(--brand-primary);
            border-radius: 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; margin: 0 auto 30px;
            box-shadow: 0 15px 40px rgba(var(--primary-rgb), 0.4);
            animation: bounce 2s infinite;
        }

        h1 { font-size: 3rem; font-weight: 900; margin-bottom: 15px; letter-spacing: -2px; }
        p { font-size: 1.2rem; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 40px; }

        .btn-confirm {
            padding: 18px 45px;
            background: #ffffff;
            color: #140705;
            border-radius: 20px;
            font-weight: 800;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            cursor: pointer;
        }
        .btn-confirm:hover {
            transform: scale(1.05);
            background: var(--brand-primary);
            color: #fff;
        }

        .confetti {
            position: absolute; width: 10px; height: 10px; background: #FF5A2D;
            top: -10px; animation: fall 4s linear infinite; opacity: 0.6;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="success-icon"><i class="ph-fill ph-crown"></i></div>
        <h1>¡Eres Premium!</h1>
        <p>Ahora tienes acceso ilimitado a todas las herramientas de organización. Tu corona ha sido activada y tu visibilidad es máxima de ahora en adelante.</p>
        <a href="index.html" class="btn-confirm">Ir a mi nuevo Dashboard</a>
    </div>

    <script>
        // Set premium status
        localStorage.setItem('is-premium', 'true');

        // Simple Confetti Effect
        for(let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDelay = Math.random() * 3 + 's';
            confetti.style.backgroundColor = ['#FF5A2D', '#FFB800', '#FFFFFF'][Math.floor(Math.random()*3)];
            document.body.appendChild(confetti);
        }
    </script>
</body>
</html>
